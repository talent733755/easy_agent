providers:
  openai:
    type: openai
    api_key: "${OPENAI_API_KEY}"
    base_url: "https://api.openai.com/v1"
    default_model: "gpt-4o"
    timeout: 60

  zhipu:
    type: openai_compatible
    api_key: "${ZHIPU_API_KEY}"
    base_url: "https://open.bigmodel.cn/api/paas/v4"
    default_model: "glm-4-plus"
    timeout: 60

  anthropic:
    type: anthropic
    api_key: "${ANTHROPIC_API_KEY}"
    default_model: "claude-sonnet-4-6"
    timeout: 60

  mimo:
    type: anthropic
    api_key: "${MIMO_API_KEY}"
    base_url: "https://token-plan-cn.xiaomimimo.com/anthropic"
    default_model: "mimo-v2-pro"
    timeout: 120

  codingplan:
    type: anthropic
    api_key: "${CODINGPLAN_API_KEY}"
    base_url: "https://maas-coding-api.cn-huabei-1.xf-yun.com/v2"
    default_model: "astron-code-latest"
    timeout: 120

active_provider: "mimo"
fallback_provider: "openai"

search:
  provider: "tavily"
  tavily_api_key: "${TAVILY_API_KEY}"

agents:
  beauty:
    name: "娇莉芙美容助手"
    icon: "💆"
    badge: ""
    description: "客户分析 · 知识检索 · MCP"
    type: "graph"
  training:
    name: "智能对练"
    icon: ""
    badge: ""
    description: "销售/消耗/售后场景模拟训练"
    type: "training"
  xiaohongshu:
    name: "小红书文案"
    icon: "📕"
    badge: "Coze"
    description: "种草笔记 & 爆款标题"
    type: "workflow"
    endpoint: "${COZE_XHS_URL}"
    api_key: "${COZE_API_KEY}"
  poster:
    name: "海报生成"
    icon: "🎨"
    badge: "Coze"
    description: "营销海报 & 活动图"
    type: "workflow"
    endpoint: "${COZE_POSTER_URL}"
    api_key: "${COZE_API_KEY}"

agent:
  max_iterations: 15
  context_compression_threshold: 0.7
  memory_nudge_interval: 10

memory:
  data_dir: "~/.easy_agent"
  memory_md_max_chars: 2000
  user_md_max_chars: 1500
  fts5_retention_days: 90
  vector_max_entries: 500

# 美容行业配置
beauty:
  knowledge_base:
    base_dir: "./knowledge/jiaolifu"
    indexes:
      products:
        path: "products"
        description: "产品知识、成分功效"
      procedures:
        path: "procedures"
        description: "服务流程、操作标准"
      scripts:
        path: "scripts"
        description: "销售话术、接待标准"
      troubleshooting:
        path: "troubleshooting"
        description: "问题处理、应急方案"

  mcp_gateway:
    url: "http://localhost:3001"
    port: 3001

  mcp_servers:
    customer:
      name: "customer"
      url: "http://localhost:3001/customer"
      timeout: 30
      intent: "query_customer"
      endpoints:
        - name: get_customer
          description: "按用户ID或手机号查客户档案。参数: customer_name (客户姓名) 或 phone (手机号，如'18102481137')"
        - name: get_consumption
          description: "查客户消费记录。参数: customer_id (客户ID，如'C001')"
        - name: get_service_history
          description: "查客户服务历史。参数: customer_id (客户ID)"
    user_profile:
      name: "user_profile"
      url: "http://localhost:3001/user_profile"
      timeout: 15
      intent: "query_customer"
      endpoints:
        - name: get_user_info
          description: "查用户档案（SAAS系统）。参数: user_id (用户ID，如'468388') 或 mobile (手机号)"

  web:
    host: "0.0.0.0"
    port: 8080
